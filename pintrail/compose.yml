#
# DEVELOPMENT COMPOSE FILE
# - This is not production ready.
#
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pintrail}
      POSTGRES_USER: ${POSTGRES_USER:-pintrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pintrail}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-pintrail}
      DB_USER: ${POSTGRES_USER:-pintrail}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pintrail}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IMAGE_STORAGE_ROOT: /data/images
      IMAGE_QUEUE_NAME: artifact-image-processing
    volumes:
      - artifact-images:/data/images

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-pintrail}
      DB_USER: ${POSTGRES_USER:-pintrail}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pintrail}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IMAGE_STORAGE_ROOT: /data/images
      IMAGE_QUEUE_NAME: artifact-image-processing
    volumes:
      - artifact-images:/data/images

volumes:
  postgres-data:
  redis-data:
  artifact-images:
