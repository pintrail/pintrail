#
# DEVELOPMENT COMPOSE FILE
# - This is not production ready.
#
services:
  # ── Holmes — System Investigation Container ────────────────────────────────
  # A persistent container with curl, wget, jq, k6, psql, redis-cli, Node,
  # Python, bat, lsd, fd, ripgrep, Neovim + LazyVim, and more.
  #
  # Use it to inspect and test your services from inside the Docker network:
  #
  #   docker compose exec holmes bash
  #   curl http://order-service:3000/health | jq .
  #   psql postgres://user:pass@postgres:5432/mydb
  #   redis-cli -h redis ping
  #   k6 run /workspace/k6/sprint-1.js
  #
  # Your repo root is mounted at /workspace, so all k6 scripts and files
  # are accessible without copying them into the container.
  #
  # See holmes/README.md for a full tool reference.
  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    environment:
      - TERM=xterm-256color
    # Holmes has no ports — access it via: docker compose exec holmes bash

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pintrail}
      POSTGRES_USER: ${POSTGRES_USER:-pintrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pintrail}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      artifact:
        condition: service_healthy
    environment:
      PORT: 8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-pintrail}
      DB_USER: ${POSTGRES_USER:-pintrail}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pintrail}
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-admin@example.com}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-change-me-now}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-24}
      ARTIFACT_SERVICE_URL: http://artifact:8001
      ARTIFACT_API_KEY: ${ARTIFACT_API_KEY:-dev-api-key}
    volumes:
      - artifact-images:/data/images

  artifact:
    build:
      context: ./artifact
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 8001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-pintrail}
      DB_USER: ${POSTGRES_USER:-pintrail}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pintrail}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IMAGE_STORAGE_ROOT: /data/images
      IMAGE_QUEUE_NAME: artifact-image-processing
      API_KEY: ${ARTIFACT_API_KEY:-dev-api-key}
    volumes:
      - artifact-images:/data/images
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_started
      artifact:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IMAGE_STORAGE_ROOT: /data/images
      IMAGE_QUEUE_NAME: artifact-image-processing
      ARTIFACT_SERVICE_URL: http://artifact:8001
      ARTIFACT_API_KEY: ${ARTIFACT_API_KEY:-dev-api-key}
    volumes:
      - artifact-images:/data/images

volumes:
  postgres-data:
  redis-data:
  artifact-images:
