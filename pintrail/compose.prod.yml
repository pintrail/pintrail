services:
  # ── Holmes — System Investigation Container ────────────────────────────────
  # A persistent container with curl, wget, jq, k6, psql, redis-cli, Node,
  # Python, bat, lsd, fd, ripgrep, Neovim + LazyVim, and more.
  #
  # Use it to inspect and test your services from inside the Docker network:
  #
  #   docker compose exec holmes bash
  #   curl http://order-service:3000/health | jq .
  #   psql postgres://user:pass@postgres:5432/mydb
  #   redis-cli -h redis ping
  #   k6 run /workspace/k6/sprint-1.js
  #
  # Your repo root is mounted at /workspace, so all k6 scripts and files
  # are accessible without copying them into the container.
  #
  # See holmes/README.md for a full tool reference.
  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    environment:
      - TERM=xterm-256color
    # Holmes has no ports — access it via: docker compose exec holmes bash

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      portal:
        condition: service_started
    environment:
      PINTRAIL_DOMAIN: ${PINTRAIL_DOMAIN:?set PINTRAIL_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      artifact:
        condition: service_healthy
    environment:
      ENV: production
      PORT: 8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:?set POSTGRES_DB}
      DB_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:?set AUTH_ADMIN_EMAIL}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:?set AUTH_ADMIN_PASSWORD}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-24}
      ARTIFACT_SERVICE_URL: http://artifact:8001
      ARTIFACT_API_KEY: ${ARTIFACT_API_KEY:?set ARTIFACT_API_KEY}
    volumes:
      - artifact-images:/data/images

  artifact:
    build:
      context: ./artifact
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 8001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:?set POSTGRES_DB}
      DB_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IMAGE_STORAGE_ROOT: /data/images
      IMAGE_QUEUE_NAME: artifact-image-processing
      API_KEY: ${ARTIFACT_API_KEY:?set ARTIFACT_API_KEY}
    volumes:
      - artifact-images:/data/images
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()",
        ]

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      artifact:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IMAGE_STORAGE_ROOT: /data/images
      IMAGE_QUEUE_NAME: artifact-image-processing
      ARTIFACT_SERVICE_URL: http://artifact:8001
      ARTIFACT_API_KEY: ${ARTIFACT_API_KEY:?set ARTIFACT_API_KEY}
    volumes:
      - artifact-images:/data/images

volumes:
  artifact-images:
  caddy-config:
  caddy-data:
  postgres-data:
  redis-data:
